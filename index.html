      }

        color: #6b7280;

      }

        margin-top: 20px;

      }

      }

      .q-text {
        font-weight: 600;
        font-size: 1.2rem;
        margin-bottom: 20px;
        color: #111827;
      }

        background: #f9fafb;
        border: 1px solid #e5e7eb;
        padding: 16px;
        margin-bottom: 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 1rem;
      }

      .opt:hover {
        background: #f3f4f6;
        border-color: #d1d5db;
      }

      .correct {
        background: #d1fae5 !important;
        border-color: #34d399 !important;
        color: #065f46;
        font-weight: 600;
      }

      .wrong {
        background: #fee2e2 !important;
        border-color: #f87171 !important;
        color: #991b1b;
      }

      .status {
        font-weight: bold;
        margin-top: 15px;
        font-size: 1rem;
        display: none;
        text-align: center;
      }

      .nav-zone {
        margin-top: 25px;
        display: flex;
        justify-content: space-between;
        height: 45px;
      }

        background: #4b5563;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        display: none;
        text-decoration: none;
      }

      .btn-nav:hover {
        background: #374151;
      }

      #next-btn {
        background: #1e40af;
        display: none;
        margin-left: auto;
      }

      #next-btn:hover {
        background: #1d4ed8;
      }

      .results-view {

        margin-top: 10px;
      }

      .score-banner {
        font-size: 1.5rem;
        font-weight: bold;
        color: #111827;
        margin-bottom: 25px;
      }

        background: #1e40af;
        color: white;
        border: none;
        padding: 14px 28px;
        font-size: 1.1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;

      }

        background: #1d4ed8;

      }

      let activeQuestions = [];
      let currentQuestionIndex = 0;
      let userAnswers = {};
      // Synthetic Audio Engine to avoid broken external links
      const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

      function playSound(type) {
        // Resume context if browser blocked auto-play
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        if (type === 'correct') {
          // Upward pleasant notification chime
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
          osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
          gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'wrong') {
          // Flat buzz drop down tone
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, audioCtx.currentTime);
          osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
          gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.25);
        } else if (type === 'complete') {
          // Fast victory flourish arpeggio
          const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
          notes.forEach((freq, index) => {
            const individualOsc = audioCtx.createOscillator();
            const individualGain = audioCtx.createGain();
            individualOsc.type = 'sine';
            individualOsc.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.08));
            individualGain.gain.setValueAtTime(0.2, audioCtx.currentTime + (index * 0.08));
            individualGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (index * 0.08) + 0.2);
            individualOsc.connect(individualGain);
            individualGain.connect(audioCtx.destination);
            individualOsc.start(audioCtx.currentTime + (index * 0.08));
            individualOsc.stop(audioCtx.currentTime + (index * 0.08) + 0.2);
          });
        }
      }

      function initQuiz() {
        const zone = document.getElementById('quiz-load-zone');
        const mainView = document.getElementById('quiz-main-view');
        const resultsZone = document.getElementById('results-zone');
        zone.innerHTML = "";
        currentQuestionIndex = 0;
        userAnswers = {};
        mainView.style.display = "block";
        resultsZone.style.display = "none";
        activeQuestions = [...staticQuizPool];
        activeQuestions.sort(() => Math.random() - 0.5);
        activeQuestions.forEach((item, idx) => {
          let options = [...item.d, item.a];
          options.sort(() => Math.random() - 0.5);
          let qCard = document.createElement('div');
          qCard.className = `q-card ${idx === 0 ? 'active' : ''}`;
          qCard.setAttribute('id', `q-card-${idx}`);
          let qText = document.createElement('div');
          qText.className = 'q-text';
          qText.textContent = `${idx + 1}. ${item.q}`;
          qCard.appendChild(qText);
          options.forEach(opt => {
            let optDiv = document.createElement('div');
            optDiv.className = 'opt';
            optDiv.textContent = opt;
            optDiv.onclick = function() {
              checkAnswer(this, opt === item.a, idx);
            };
            qCard.appendChild(optDiv);
          });
          let statusDiv = document.createElement('div');
          statusDiv.className = 'status';
          qCard.appendChild(statusDiv);
          zone.appendChild(qCard);
        });
        updateNavigationLayout();
      }

      function updateNavigationLayout() {
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const mainContainer = document.getElementById('main-container');
        mainContainer.classList.remove('flash-correct', 'flash-wrong');
        prevBtn.style.display = currentQuestionIndex > 0 ? "inline-block" : "none";
        if (userAnswers[currentQuestionIndex] !== undefined) {
          nextBtn.style.display = "inline-block";
          nextBtn.textContent = currentQuestionIndex === activeQuestions.length - 1 ? "Finish Exam" : "Next Question →";
        } else {
          nextBtn.style.display = "none";
        }
        const progressIndicator = document.getElementById('progress-indicator');
        const progressLabel = document.getElementById('progress-label');
        const percent = (currentQuestionIndex / activeQuestions.length) * 100;
        progressIndicator.style.width = `${percent}%`;
        progressLabel.textContent = `Question ${currentQuestionIndex + 1} of ${activeQuestions.length}`;
      }

      function checkAnswer(selectedElement, isCorrect, cardIdx) {
        const parentCard = selectedElement.parentElement;
        if (userAnswers[cardIdx] !== undefined) return;
        const allOptions = parentCard.querySelectorAll('.opt');
        const statusText = parentCard.querySelector('.status');
        const nextBtn = document.getElementById('next-btn');
        const mainContainer = document.getElementById('main-container');
        userAnswers[cardIdx] = {
          selected: selectedElement.textContent,
          isCorrect: isCorrect
        };
        if (isCorrect) {
          selectedElement.classList.add('correct');
          statusText.textContent = "✓ Correct Answer";
          statusText.style.color = "#059669";
          mainContainer.classList.add('flash-correct');
          playSound('correct');
        } else {
          selectedElement.classList.add('wrong');
          statusText.textContent = "✗ Incorrect";
          statusText.style.color = "#dc2626";
          mainContainer.classList.add('flash-wrong');
          playSound('wrong');
          allOptions.forEach(opt => {
            if (opt.textContent === activeQuestions[cardIdx].a) {
              opt.classList.add('correct');
            }
          });
        }
        statusText.style.display = "block";
        nextBtn.textContent = currentQuestionIndex === activeQuestions.length - 1 ? "Finish Exam" : "Next Question →";
        nextBtn.style.display = "inline-block";
      }

      function goToNextQuestion() {
        const currentCard = document.getElementById(`q-card-${currentQuestionIndex}`);
        currentCard.classList.remove('active');
        currentQuestionIndex++;
        if (currentQuestionIndex < activeQuestions.length) {
          const nextCard = document.getElementById(`q-card-${currentQuestionIndex}`);
          nextCard.classList.add('active');
          updateNavigationLayout();
        } else {
          showFinalMetrics();
        }
      }

      function goToPrevQuestion() {
        if (currentQuestionIndex === 0) return;
        const currentCard = document.getElementById(`q-card-${currentQuestionIndex}`);
        currentCard.classList.remove('active');
        currentQuestionIndex--;
        const prevCard = document.getElementById(`q-card-${currentQuestionIndex}`);
        prevCard.classList.add('active');
        updateNavigationLayout();
        const mainContainer = document.getElementById('main-container');
        if (userAnswers[currentQuestionIndex].isCorrect) {
          mainContainer.classList.add('flash-correct');
        } else {
          mainContainer.classList.add('flash-wrong');
        }
      }

      function showFinalMetrics() {
        document.getElementById('quiz-main-view').style.display = "none";
        const resultsZone = document.getElementById('results-zone');
        const scoreDisplay = document.getElementById('score-display');
        let correctCount = Object.values(userAnswers).filter(ans => ans.isCorrect).length;
        const total = activeQuestions.length;
        scoreDisplay.textContent = `Your Score: ${correctCount} / ${total} (${Math.round((correctCount / total) * 100)}%)`;
        resultsZone.style.display = "block";
        playSound('complete');
      }
      window.onload = initQuiz;
    </script>
